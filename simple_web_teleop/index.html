<!doctype html>
<title>Stretch Simple Teleop</title>
<style>
  body { font-family: sans-serif; padding: 2rem; }
  button { font-size: 1.4rem; padding: 0.8rem 1.6rem; margin: 0.3rem; }
</style>

<h1>Stretch Simple Teleop</h1>
<p id="status">connecting…</p>
<button id="top" disabled>Arm Top</button>
<button id="bottom" disabled>Arm Bottom</button>

<script>
  const ws = new WebSocket("wss://localhost:9090");
  const topBtn = document.getElementById("top");
  const bottomBtn = document.getElementById("bottom");
  const statusEl = document.getElementById("status");

  ws.onopen = () => {
    statusEl.textContent = "connected";
    topBtn.disabled = bottomBtn.disabled = false;
  };
  ws.onclose = () => {
    statusEl.textContent = "disconnected — accept cert at https://localhost:9090 and reload";
    topBtn.disabled = bottomBtn.disabled = true;
  };

  let id = 0;
  const send = (msg) => ws.send(JSON.stringify({ ...msg, id: `msg-${++id}` }));

  // "send_goal" (not "send_action_goal") matches the hello-vinitha roslibjs fork
  // that the sim's rosbridge runs.
  const moveLift = (meters) => {
    send({ op: "call_service", service: "/switch_to_navigation_mode", type: "std_srvs/srv/Trigger" });
    send({
      op: "send_goal",
      action_name: "/stretch_controller/follow_joint_trajectory",
      action_type: "control_msgs/action/FollowJointTrajectory",
      goal_msg: {
        trajectory: {
          joint_names: ["joint_lift"],
          points: [{ positions: [meters], time_from_start: { secs: 3, nsecs: 0 } }],
        },
      },
    });
  };

  topBtn.onclick = () => moveLift(1.09);
  bottomBtn.onclick = () => moveLift(0.20);
</script>
